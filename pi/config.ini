[server]
# Windows laptop IP address running YOLO server
# Server is running at: http://10.168.71.19:8000 (VERIFIED)
url = http://10.168.71.19:8000

[rl]
# Q-Learning hyperparameters
alpha = 0.1          # Learning rate
gamma = 0.95         # Discount factor
epsilon = 0.1        # Exploration rate (10% random actions)

[target]
# Object to navigate to (YOLO class name)
# Common: person, bottle, cup, chair, laptop, cell phone
object_class = bottle

[safety]
# Safety parameters
collision_threshold = 0.15       # meters - emergency stop distance
max_steps_per_episode = 200      # Maximum steps before resetting episode
